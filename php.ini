[PHP]
; Minimal php.ini for Hotel Management System Demo
extension_dir = "ext"
extension = pdo_sqlite
extension = sqlite3
extension = mbstring
extension = openssl

display_errors = On
error_reporting = E_ALL & ~E_NOTICE & ~E_DEPRECATED
max_execution_time = 60
memory_limit = 256M
upload_max_filesize = 10M
post_max_size = 10M
date.timezone = Asia/Manila

[Session]
session.save_path = "C:\php\sessions"
